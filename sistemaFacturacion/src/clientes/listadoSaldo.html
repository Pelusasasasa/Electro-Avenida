<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listado de saldo</title>
    <link rel="stylesheet" href="../assets/css/globales.css">
    <link rel="stylesheet" href="../assets/css/rustic-theme.css">
    <link rel="stylesheet" href="./clientes.css">
  </head>
  <body class="rustic-fluid listadoSaldo">
    <div class="workshop-shell">
      <header class="workshop-header">
        <div class="title">Administración // <span>Listado de Saldos</span></div>
        <div class="flex gap-4">
          <span class="mono fecha" style="color: var(--ws-green); font-weight: 700;"></span>
        </div>
      </header>

      <main class="flex flex-col flex-1 overflow-hidden gap-2">
        <div class="flex justify-around gap-2 items-center mb-6">
          <h1 class="mono text-2xl" style="color: var(--ws-green-dim); margin: 0; font-weight: 800;">MOVIMIENTOS DE CUENTA</h1>
          <button id="descargar" class="workshop-btn primary descargo">
            DESCARGAR LISTADO
          </button>
        </div>

        <div class="workshop-table-card">
          <div class="workshop-table-container">
            <table class="workshop-table">
              <thead>
                <tr>
                  <th class="mono">COD</th>
                  <th>Cliente</th>
                  <th>Dirección</th>
                  <th>Cond IVA</th>
                  <th>Teléfono</th>
                  <th style="text-align: right;">Saldo</th>
                  <th class="none saldoP">Saldo P</th>
                </tr>
              </thead>
              <tbody class="tbody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script src="listadoSaldo.js"></script>
</html>
